<!DOCTYPE html>
<html>
<head>
<title>Entradas Revoltosos</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body style="text-align:center;font-family:Arial">

<h1>Entradas Revoltosos</h1>
<p>Después de hacer la transferencia generá tu entrada</p>

<button onclick="generarEntrada()">Generar Entrada</button>

<h2>Tu QR:</h2>
<div id="qrcode"></div>

<script>

function generarEntrada(){

let codigo = "ENTRADA-" + Math.floor(Math.random()*1000000000)

document.getElementById("qrcode").innerHTML=""

new QRCode(document.getElementById("qrcode"), {
text: codigo,
width:200,
height:200
})

}

</script>

</body>
</html>
